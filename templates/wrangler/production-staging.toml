# Production and staging Cloudflare Worker config.
# Copy to wrangler.toml and change the Worker names.

name = "my-worker"
main = "src/index.js"
compatibility_date = "2026-04-23"
workers_dev = true
preview_urls = true

[vars]
ENVIRONMENT = "production"

[env.staging]
name = "my-worker-staging"
workers_dev = true
preview_urls = true

[env.staging.vars]
ENVIRONMENT = "staging"
