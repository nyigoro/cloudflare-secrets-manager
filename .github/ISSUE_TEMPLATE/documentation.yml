name: Documentation issue
description: Report missing, confusing, or incorrect documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
      description: Which document needs work?
      placeholder: docs/configuration.md, README.md, templates/README.md
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is confusing or missing?
      placeholder: The docs say variables, but Cloudflare calls them Plaintext...
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording or fix
      description: Optional, but helpful.

  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I did not include real secrets, tokens, account IDs, or private URLs.
          required: true
